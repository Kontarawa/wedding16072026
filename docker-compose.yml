services:
  wedding:
    build: .
    image: wedding-invitation:latest
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      LISTEN_ADDR: ":8080"
      # Сохранение ответов анкеты в Google Sheets (через Apps Script вебхук)
      GOOGLE_SHEETS_WEBHOOK_URL: ${GOOGLE_SHEETS_WEBHOOK_URL:-}
      GOOGLE_SHEETS_WEBHOOK_TOKEN: ${GOOGLE_SHEETS_WEBHOOK_TOKEN:-}
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - wedding
