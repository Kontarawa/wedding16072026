services:
  web:
    build: .
    image: sv-invent:latest
    restart: unless-stopped
    ports:
      - "1606:1606"
    environment:
      PORT: "1606"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:1606/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
