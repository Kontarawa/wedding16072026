services:
  wedding:
    build: .
    image: wedding-invitation:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      DATA_DIR: /app/data
      GUEST_DB: /app/data/guests.json
      # Обязательно для записи анкет в таблицу: URL веб-приложения (…/exec), см. scripts/google-apps-script.gs
      # Задайте в .env рядом с compose: GOOGLE_SHEETS_WEBAPP_URL=https://script.google.com/macros/s/.../exec
      GOOGLE_SHEETS_WEBAPP_URL: "${GOOGLE_SHEETS_WEBAPP_URL:-}"
      # Секрет для POST /wedding/invitation/make (генерация ссылок)
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      # Опционально: встроенный HTTPS в Go
      # TLS_CERT_FILE: /certs/fullchain.pem
      # TLS_KEY_FILE: /certs/privkey.pem
    volumes:
      - ./data:/app/data
    # volumes:
    #   - ./certs:/certs:ro
